name: AI Failure Monitor

on:
  workflow_run:
    workflows: ["Python CI"]
    types:
      - completed

jobs:
  analyze-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Python
        run: python --version

      - name: Install Python Packages
        run: pip install requests python-dotenv ollama

      - name: Fetch GitHub Logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/agents/github_log_fetcher.py

      - name: Run AI Analysis
        run: python src/agents/log_analyzer.py

      - name: Upload AI Report
        uses: actions/upload-artifact@v4
        with:
          name: ai-failure-report
          path: src/reports/
